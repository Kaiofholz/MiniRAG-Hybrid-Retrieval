name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run package import test
        run: |
          python - <<'PY'
          import minirag.schemas
          import minirag.cache
          import minirag.formatting
          import minirag.routing
          import minirag.generation
          import minirag.retrieval
          import minirag.evidence
          import minirag.extraction
          import minirag.answering
          import minirag.evaluation
          import minirag.factory

          print("all module imports ok")
          PY

      - name: Run pytest
        run: |
          python -m pytest

      - name: Compile package
        run: |
          python -m py_compile minirag/*.py
